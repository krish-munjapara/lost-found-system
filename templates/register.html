<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Lost & Found</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="page-wrapper">

  <div class="left-image"></div>

  <div class="right-box">

    <div class="top-header">
      <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
      <span class="project-name">Lost & Found Child Detection System</span>
    </div>

    <div class="login-card">
      <h2>Register</h2>
      <p class="subtitle">Create your account</p>

      <form method="POST" action="/register">
        <input type="text" name="full_name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" placeholder="Re-type Password" required>
        <input type="text" name="mobile" placeholder="Contact Number" maxlength="10" required>

        <select name="gender" required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <input type="text" id="address" name="address" placeholder="Address" required>

        <button type="button" class="google-btn" onclick="fillAddress()">
          📍 Use Current Location
        </button>

        <button type="submit" class="login-btn">Register</button>
      </form>

      <p class="switch">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
      </p>
    </div>

    <div class="lang-dropdown">
      🌐 Language
      <div class="lang-menu">
        <div>English</div>
        <div>Hindi</div>
      </div>
    </div>

  </div>
</div>

<script>
function fillAddress() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function (pos) {
      document.getElementById("address").value =
        "Lat: " + pos.coords.latitude.toFixed(4) +
        ", Lon: " + pos.coords.longitude.toFixed(4);
    },
    function () {
      alert("Location permission denied");
    }
  );
}
</script>

</body>
</html>
