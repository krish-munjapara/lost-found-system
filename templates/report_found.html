<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Found Child</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- LINK SAME CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/report.css') }}">
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="header">
        <h1>📍 Report Found Child</h1>
        <a href="/dashboard" class="back-btn">⬅ Back to Dashboard</a>
    </div>

    <!-- FORM CARD -->
    <div class="card">
        <form method="POST" enctype="multipart/form-data">

            <label>Child Name (if known)</label>
            <input type="text" name="child_name" placeholder="Optional">

            <label>Age</label>
            <input type="number" name="age" placeholder="Approx age" required>

            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Found Location</label>
            <input type="text" name="location" placeholder="Where child was found" required>

            <label>Description</label>
            <textarea name="description" placeholder="Condition, clothes, details..." required></textarea>

            <label>Upload Child Photo</label>
            <input type="file" name="photo" accept="image/*" required>

            <button type="submit">📌 Submit Found Report</button>

        </form>
    </div>

</div>

</body>
</html>
