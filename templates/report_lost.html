<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Missing Child</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

   
    <link rel="stylesheet" href="{{ url_for('static', filename='css/report.css') }}">
</head>

<body>

<div class="page">

   
    <div class="header">
        <h1>🧒 Report Missing Child</h1>
        <a href="/dashboard" class="back-btn">⬅ Back to Dashboard</a>
    </div>

   
    <div class="card">
        <form method="POST" enctype="multipart/form-data">

            <label>Child Name</label>
            <input type="text" name="child_name" placeholder="Enter child name" required>

            <label>Age</label>
            <input type="number" name="age" placeholder="Enter age" required>

            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Last Seen Location</label>
            <input type="text" name="location" placeholder="Last seen location" required>

            <label>Description</label>
            <textarea name="description" placeholder="Clothes, marks, details..." required></textarea>

            <label>Upload Child Photo</label>
            <input type="file" name="photo" accept="image/*" required>

            <button type="submit">🚨 Submit Missing Report</button>

        </form>
    </div>

</div>

</body>
</html>
